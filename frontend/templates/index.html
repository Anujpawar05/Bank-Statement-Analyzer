<!DOCTYPE html>
<html>

<head>
    <title>Bank Statement Analyzer</title>

    <link
        rel="stylesheet"
        href="/static/style.css">

</head>

<body>

<div class="container">

<h1>Bank Statement Analyzer</h1>

<p>
Upload your bank statement PDF and download the analyzed Excel workbook.
</p>

<form
id="upload-form"
enctype="multipart/form-data">

<input
type="file"
id="file"
accept=".pdf"
required>

<button type="submit">

Analyze Statement

</button>

</form>

<div id="status"></div>

</div>

<script src="/static/app.js"></script>

</body>

</html>
